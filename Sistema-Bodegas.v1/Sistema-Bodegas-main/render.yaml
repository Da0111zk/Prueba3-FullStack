services:
  - type: web
    name: eureka-server
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/eureka-server
    envVars:
      - key: SPRING_APPLICATION_NAME
        value: eureka-server
      - key: EUREKA_CLIENT_REGISTERWITHEUREKA
        value: "false"
      - key: EUREKA_CLIENT_FETCHREGISTRY
        value: "false"
      - key: EUREKA_SERVER_ENABLE_SELF_PRESERVATION
        value: "false"
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m

  - type: web
    name: ms-gateway
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-gateway
    envVars:
      - key: SPRING_APPLICATION_NAME
        value: ms-gateway
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka
      - key: EUREKA_INSTANCE_PREFER_IP_ADDRESS
        value: "false"
      - key: SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED
        value: "false"
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m

  - type: web
    name: ms-categorias
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-categorias
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-categorias
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_CATEGORIAS

  - type: web
    name: ms-bodega
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-bodega
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-bodega
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_BODEGA

  - type: web
    name: ms-proveedores
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-proveedores
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-proveedores
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_PROVEEDORES

  - type: web
    name: ms-usuarios
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-usuarios
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-usuarios
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_USUARIOS

  - type: web
    name: ms-producto
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-producto
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-producto
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_PRODUCTO
      - key: MS_CATEGORIAS_URL
        value: https://ms-categorias.onrender.com

  - type: web
    name: ms-kardex
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-kardex
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-kardex
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_KARDEX
      - key: MS_PRODUCTOS_URL
        value: https://ms-producto.onrender.com

  - type: web
    name: ms-ingresos
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-ingresos
    envVars:
      - fromGroup: oracle-wallet-shared
