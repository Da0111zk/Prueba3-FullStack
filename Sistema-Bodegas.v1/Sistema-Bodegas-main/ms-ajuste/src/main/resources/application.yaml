# Variables dinámicas para URLs de microservicios
ms:
  productos:
    url: ${MS_PRODUCTOS_URL:http://ms-productos:8082}
  kardex:
    url: ${MS_KARDEX_URL:http://ms-kardex:8086}

# Configuración de documentación con Swagger / OpenApi
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Integración con el Servidor de Descubrimiento Eureka
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka/}
  instance:
    prefer-ip-address: true