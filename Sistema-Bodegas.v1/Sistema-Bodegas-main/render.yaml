        value: SCHEMA_EGRESOS
      - key: MS_PRODUCTOS_URL
        value: https://ms-producto.onrender.com
      - key: MS_KARDEX_URL
        value: https://ms-kardex.onrender.com

  - type: web
    name: ms-ajuste
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-ajuste
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-ajuste
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_AJUSTES
      - key: MS_PRODUCTOS_URL
        value: https://ms-producto.onrender.com
      - key: MS_KARDEX_URL
