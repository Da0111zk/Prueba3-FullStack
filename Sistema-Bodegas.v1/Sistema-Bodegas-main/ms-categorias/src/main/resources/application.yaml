server:
  port: 8081
  error:
    include-message: always

spring:
  application:
    name: ms-categorias
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@mmg8hvewk688yrh4_low?TNS_ADMIN=/etc/secrets}
    username: ${SPRING_DATASOURCE_USERNAME:SCHEMA_CATEGORIAS}
    password: ${SPRING_DATASOURCE_PASSWORD:FullStack-Bodega1}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE:2}
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: ${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}