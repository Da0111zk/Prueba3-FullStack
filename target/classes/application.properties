# Puerto definitivo para este microservicio
server.port=8088
server.address=0.0.0.0

# Identidad del servicio
spring.application.name=ms-bodegas
spring.profiles.active=dev


# Hibernate creará las tablas automáticamente en tu db_bodega de Laragon
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Conexión directa a Laragon (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/db_bodega
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración limpia de Swagger para Spring Boot 3.x (Evita el Error 500)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha





