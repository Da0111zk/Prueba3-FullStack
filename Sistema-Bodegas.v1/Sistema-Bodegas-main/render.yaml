        value: ms-ingresos
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_INGRESOS
      - key: MS_PRODUCTOS_URL
        value: https://ms-producto.onrender.com
      - key: MS_PROVEEDORES_URL
        value: https://ms-proveedores.onrender.com
      - key: MS_BODEGA_URL
        value: https://ms-bodega.onrender.com
      - key: MS_KARDEX_URL
        value: https://ms-kardex.onrender.com

  - type: web
    name: ms-egresos
    runtime: docker
    plan: free
