services:
  - type: web
    name: eureka-server
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_APPLICATION_NAME
        value: eureka-server
      - key: EUREKA_CLIENT_REGISTERWITHEUREKA
        value: "false"
      - key: EUREKA_CLIENT_FETCHREGISTRY
        value: "false"
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m

  - type: web
    name: ms-gateway
    runtime: docker
    plan: free
    envVars:
      - key: SPRING_APPLICATION_NAME
        value: ms-gateway
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://repo-eureka-server.onrender.com/eureka/
      - key: EUREKA_INSTANCE_PREFER_IP_ADDRESS
        value: "true"
      - key: SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED
        value: "false"
      - key: SERVER_PORT
        value: "8080"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m

  - type: web
    name: ms-ajuste
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-ajuste
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_AJUSTES

  - type: web
    name: ms-bodega
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-bodega
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_BODEGA

  - type: web
    name: ms-categorias
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-categorias
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_CATEGORIAS

  - type: web
    name: ms-egresos
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-egresos
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_EGRESOS

  - type: web
    name: ms-ingresos
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-ingresos
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_INGRESOS

  - type: web
    name: ms-kardex
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-kardex
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_KARDEX

  - type: web
    name: ms-producto
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-producto
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_PRODUCTO

  - type: web
    name: ms-proveedores
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-proveedores
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_PROVEEDORES

  - type: web
    name: ms-traslados
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-traslados
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_TRASLADOS

  - type: web
    name: ms-usuarios
    runtime: docker
    plan: free
    envVars:
      - fromGroup: oracle-wallet-shared
      - key: SPRING_APPLICATION_NAME
        value: ms-usuarios
      - key: SPRING_DATASOURCE_USERNAME
        value: SCHEMA_USUARIOS

envVarGroups:
  - name: oracle-wallet-shared
    envVars:
      # !! Asegúrate de que esta URL coincida con la de tu Eureka activo:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://repo-eureka-server.onrender.com/eureka/
      - key: EUREKA_INSTANCE_PREFER_IP_ADDRESS
        value: "true"
      - key: SERVER_PORT
        value: "8080"
      - key: TNS_ADMIN
        value: /etc/secrets
      - key: SPRING_DATASOURCE_URL
        value: jdbc:oracle:thin:@mmg8hvewk688yrh4_low?TNS_ADMIN=/etc/secrets
      - key: SPRING_DATASOURCE_PASSWORD
        value: FullStack-Bodega1
      - key: SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE
        value: "2"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: none
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m
    secretFiles:
      - key: cwallet.sso
        contents: 
      - key: tnsnames.ora
        contents: |
