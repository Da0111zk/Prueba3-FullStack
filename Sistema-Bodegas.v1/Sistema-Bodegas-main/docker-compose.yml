      - "8081:8081"
    environment:
      - SPRING_APPLICATION_NAME=ms-categorias
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - JAVA_OPTS=-Xmx256m -Xms128m
      - TNS_ADMIN=/wallet
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@mmg8hvewk688yrh4_low?TNS_ADMIN=/wallet
      - SPRING_DATASOURCE_USERNAME=SCHEMA_CATEGORIAS
      - SPRING_DATASOURCE_PASSWORD=FullStack-Bodega1
      # 🔽 Ajuste de pool de conexiones
      - SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE=2
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
      - SPRING_JPA_SHOW_SQL=false
    volumes:
      - "C:/Users/usuario/Downloads/Wallet_MMG8HVEWK688YRH4:/wallet:ro"
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
