      - key: ORACLE_SQLNET
        value: WALLET_LOCATION = (SOURCE = (METHOD = file) (METHOD_DATA = (DIRECTORY = "/app/wallet")))\nSSL_SERVER_DN_MATCH=yes
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: none
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m
      - key: WALLET_BASE64
        value: 
  - name: eureka-config
    envVars:
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://eureka-server-ccfr.onrender.com/eureka
      - key: EUREKA_INSTANCE_PREFER_IP_ADDRESS
        value: "true"

services:
  # ============================================
  # 1. EUREKA SERVER
  # ============================================
  - type: web
    name: eureka-server
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/eureka-server
    envVars:
      - key: SPRING_APPLICATION_NAME
        value: eureka-server
      - key: SERVER_PORT
        value: "8761"
      - key: EUREKA_CLIENT_REGISTERWITHEUREKA
        value: "false"
      - key: EUREKA_CLIENT_FETCHREGISTRY
        value: "false"
      - key: EUREKA_SERVER_ENABLE_SELF_PRESERVATION
        value: "false"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m

  # ============================================
  # 2. API GATEWAY
  # ============================================
  - type: web
    name: ms-gateway
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-gateway
    envVars:
      - fromGroup: eureka-config
      - key: SPRING_APPLICATION_NAME
        value: ms-gateway
      - key: SERVER_PORT
        value: "8080"
      - key: SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED
        value: "true"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m

  # ============================================
  # 3. MICROSERVICIOS DE NEGOCIO
  # ============================================
  - type: web
    name: ms-usuarios
    runtime: docker
    plan: free
    rootDir: Sistema-Bodegas.v1/Sistema-Bodegas-main/ms-usuarios
    envVars:
      - fromGroup: oracle-wallet-shared
      - fromGroup: eureka-config
