        value: https://ms-bodega.onrender.com
      - key: MS_BODEGA_URL
        value: https://ms-bodega.onrender.com

envVarGroups:
  - name: oracle-wallet-shared
    envVars:
      # CORRECCIÓN DE COMUNICACIÓN PERIMETRAL EUREKA
      - key: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: https://eureka-server.onrender.com/eureka
      - key: EUREKA_INSTANCE_PREFER_IP_ADDRESS
        value: "false"
      - key: SERVER_PORT
        value: "8080"
      - key: TNS_ADMIN
        value: /app/wallet 
      - key: SPRING_DATASOURCE_URL
        value: jdbc:oracle:thin:@mmg8hvewk688yrh4_low?TNS_ADMIN=/app/wallet 
      - key: SPRING_DATASOURCE_PASSWORD
        value: FullStack-Bodega1
      - key: SPRING_DATASOURCE_HIKARI_MAXIMUMPOOLSIZE
        value: "2"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: none
      - key: SPRING_JPA_SHOW_SQL
        value: "false"
      - key: JAVA_OPTS
        value: -Xmx384m -Xms128m
      
      - key: WALLET_BASE64
        value:  
