          mmg8hvewk688yrh4_medium = (description= (retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.sa-santiago-1.oraclecloud.com))(connect_data=(service_name=g0fbf24ba59b790_mmg8hvewk688yrh4_medium.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))
          mmg8hvewk688yrh4_low = (description= (retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.sa-santiago-1.oraclecloud.com))(connect_data=(service_name=g0fbf24ba59b790_mmg8hvewk688yrh4_low.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))
          mmg8hvewk688yrh4_tp = (description= (retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.sa-santiago-1.oraclecloud.com))(connect_data=(service_name=g0fbf24ba59b790_mmg8hvewk688yrh4_tp.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))
          mmg8hvewk688yrh4_tpurgent = (description= (retry_count=20)(retry_delay=3)(address=(protocol=tcps)(port=1522)(host=adb.sa-santiago-1.oraclecloud.com))(connect_data=(service_name=g0fbf24ba59b790_mmg8hvewk688yrh4_tpurgent.adb.oraclecloud.com))(security=(ssl_server_dn_match=yes)))
      - key: sqlnet.ora
        contents: |
          WALLET_LOCATION = (SOURCE = (METHOD = FILE) (METHOD_DATA = (DIRECTORY = "/etc/secrets")))
          SSL_SERVER_DN_MATCH = YES