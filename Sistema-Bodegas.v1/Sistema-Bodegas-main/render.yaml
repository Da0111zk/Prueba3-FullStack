        value: "2"
      - key: SPRING_DATASOURCE_HIKARI_MINIMUMIDLE
        value: "1"
      - key: SPRING_DATASOURCE_HIKARI_CONNECTIONTESTQUERY
        value: SELECT 1 FROM DUAL
      - key: SPRING_DATASOURCE_HIKARI_VALIDATIONTIMEOUT
        value: "30000"
      - key: SPRING_DATASOURCE_HIKARI_CONNECTIONTIMEOUT
        value: "45000"
