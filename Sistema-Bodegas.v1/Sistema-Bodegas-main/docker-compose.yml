# ════════════════════════════════════════════════════════════════════════════
# RED INTERNA
# Todos los contenedores se comunican por nombre (ej: http://ms-kardex:8086)
# ════════════════════════════════════════════════════════════════════════════

networks:
  bodega-network:
    driver: bridge
    name: bodega-network
    driver_opts:
      com.docker.network.bridge.name: "bodega-network"
