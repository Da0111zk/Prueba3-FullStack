services:
 
  # ════════════════════════════════════════════════════════════════════════════
  # EUREKA SERVER — servidor de descubrimiento
  # Debe arrancar primero. Los demás servicios esperan que esté healthy.
  # ════════════════════════════════════════════════════════════════════════════
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    extra_hosts:
          - "mmg8hvewk688yrh4_low:140.238.216.51"
    ports:
      - "8761:8761"          # Panel web de Eureka: http://localhost:8761
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m
    healthcheck:
      test: ["NONE"]
    networks:
      - bodega-network
    restart: unless-stopped
 
  # ════════════════════════════════════════════════════════════════════════════
  # API GATEWAY — único punto de entrada externo (puerto 8080)
  # ════════════════════════════════════════════════════════════════════════════
  ms-gateway:
    build:
      context: ./ms-gateway
      dockerfile: Dockerfile
    container_name: ms-gateway
    extra_hosts:
          - "mmg8hvewk688yrh4_low:140.238.216.51"
    ports:
      - "8080:8080"          # TODO el tráfico del frontend entra por acá
    environment:
      - JAVA_OPTS=-Xmx256m -Xms128m
      - SPRING_APPLICATION_NAME=ms-gateway
      - EUREKA_CLIENT_SERVICE-URL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED=false
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - bodega-network
    restart: unless-stopped
 
  # ════════════════════════════════════════════════════════════════════════════
  # MICROSERVICIOS DE NEGOCIO
  # Todos comparten:
  #   - EUREKA_URL: apunta al contenedor eureka-server
  #   - WALLET_PATH: volumen montado con el wallet de Oracle Cloud
  #   - DB_PASSWORD: password de Oracle (cambiar en producción por secret)
  # ════════════════════════════════════════════════════════════════════════════
 
  ms-categorias:
    build:
      context: ./ms-categorias
      dockerfile: Dockerfile
    container_name: ms-categorias
    extra_hosts:
          - "mmg8hvewk688yrh4_low:140.238.216.51"
    ports:
      - "8081:8081"          # Expuesto para debugging directo (opcional en prod)
    environment:
      - EUREKA_URL=http://eureka-server:8761/eureka/
      - WALLET_PATH=/wallet
      - DB_PASSWORD=FullStack-Bodega1
      - JAVA_OPTS=-Xmx256m -Xms128m
      - TNS_ADMIN=/wallet
      - SPRING_DATASOURCE_URL=jdbc:oracle:thin:@mmg8hvewk688yrh4_low?TNS_ADMIN=/wallet
    volumes:
      # Monta el wallet de Oracle Cloud dentro del contenedor
      # Cambiar la ruta izquierda a donde tengas el wallet en tu máquina/servidor
      - ${WALLET_PATH:-C:\Users\usuario\Downloads\Sistema-Bodegas.v1.2.1\Sistema-Bodegas.v1.2.1\Wallet_MMG8HVEWK688YRH4}:/wallet:ro
    depends_on:
      eureka-server:
        condition: service_started
    networks:
      - bodega-network
    restart: unless-stopped
    healthcheck:
      test: ["NONE"]
 
  ms-productos:
